<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 寵物工具箱 — CHEWY 蚯蚓工作室</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
    background: #faf8f5;
    color: #3d3225;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    text-align: center;
    padding: 3.5rem 1.5rem 2.5rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 0.5rem;
  }

  header p {
    font-size: 1.1rem;
    color: #7a6e60;
  }

  main {
    flex: 1;
    max-width: 960px;
    width: 100%;
    margin: 0 auto;
    padding: 0 1.5rem 3rem;
  }

  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .tool-card {
    background: #fff;
    border-radius: 14px;
    padding: 2rem 1.75rem;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 1px 4px rgba(61, 50, 37, 0.06);
    border: 1px solid rgba(212, 136, 58, 0.12);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .tool-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(212, 136, 58, 0.13);
    border-color: rgba(212, 136, 58, 0.3);
  }

  .tool-card .icon {
    font-size: 2.2rem;
    line-height: 1;
  }

  .tool-card h2 {
    font-size: 1.2rem;
    font-weight: 600;
    color: #d4883a;
  }

  .tool-card p {
    font-size: 0.95rem;
    color: #7a6e60;
    line-height: 1.6;
  }

  .tool-card .arrow {
    margin-top: auto;
    font-size: 0.85rem;
    color: #d4883a;
    font-weight: 500;
  }

  footer {
    text-align: center;
    padding: 2rem 1.5rem 2.5rem;
    border-top: 1px solid rgba(212, 136, 58, 0.12);
  }

  footer .brand {
    font-size: 0.9rem;
    color: #7a6e60;
    margin-bottom: 0.4rem;
  }

  footer .disclaimer {
    font-size: 0.8rem;
    color: #a89c8e;
  }

  @media (max-width: 480px) {
    header { padding: 2.5rem 1.25rem 2rem; }
    header h1 { font-size: 1.6rem; }
    header p { font-size: 1rem; }
    .tools-grid { grid-template-columns: 1fr; }
    .tool-card { padding: 1.5rem 1.25rem; }
  }
</style>
</head>
<body>

<header>
  <h1>🐾 寵物工具箱</h1>
  <p>給毛孩家庭的免費實用工具</p>
</header>

<main>
  <div class="tools-grid">

    <a href="./dog-food/" class="tool-card">
      <span class="icon">🐕</span>
      <h2>狗狗鮮食熱量計算機</h2>
      <p>計算鮮食熱量與營養配比，支援多犬管理與每日記錄</p>
      <span class="arrow">開始使用 →</span>
    </a>

  </div>
</main>

<footer>
  <p class="brand">Made with ❤️ by CHEWY 蚯蚓工作室</p>
  <p class="disclaimer">本站工具僅供參考，不能取代專業獸醫建議</p>
</footer>

</body>
</html>
